plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0.0'

// Final package identity MUST be confirmed by the owner before Amazon
// Appstore submission (see docs/RELEASE_CHECKLIST.md). Changing the
// applicationId after release breaks Amazon entitlements.
def tinycanvasApplicationId = project.hasProperty('TINYCANVAS_APPLICATION_ID')
        ? project.property('TINYCANVAS_APPLICATION_ID')
        : 'com.tinycanvas.adventures'

android {
    namespace "com.tinycanvas.adventures"
    compileSdk 36

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId tinycanvasApplicationId
        // Fire OS floor: Fire OS 6 is Android 7.1 (API 25). Fire OS 5 (API 22)
        // devices are handled by the Unsupported Device screen when the app
        // is side-loaded; the store floor is minSdk 25.
        minSdk 25
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        // Tablet-only: no abiFilters needed; Fire tablets are arm.
    }

    buildTypes {
        release {
            // Development-signed with debug keys until the owner supplies a
            // secure signing configuration (docs/RELEASE_CHECKLIST.md).
            signingConfig signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // Amazon Appstore SDK (IAP v3):
    // The SDK jar/aar is distributed by Amazon and must be added by the owner
    // (see docs/AMAZON_IAP_SETUP.md). Uncomment after placing the artifact:
    // implementation files('libs/appstore-sdk.jar')
    // No Google Play Services, no Firebase, no ads, no analytics.
}
